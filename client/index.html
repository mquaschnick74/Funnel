<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>iVASA Inner Landscape Assessment</title>
    <meta name="description" content="Discover your mental health answer with a 5 question personalized assessment - AI-powered therapeutic support available 24/7." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://start.ivasa.ai" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="iVASA Inner Landscape Assessment" />
    <meta property="og:description" content="Discover your mental health answer with a 5 question personalized assessment - AI-powered therapeutic support available 24/7." />
    <meta property="og:image" content="https://start.ivasa.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://start.ivasa.ai" />
    <meta property="og:site_name" content="iVASA" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="iVASA Inner Landscape Assessment" />
    <meta name="twitter:description" content="Discover your mental health answer with a 5 question personalized assessment - AI-powered therapeutic support available 24/7." />
    <meta name="twitter:image" content="https://start.ivasa.ai/og-image.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Therapy desert variant: update meta tags when ?variant=desert is present
      (function () {
        var params = new URLSearchParams(window.location.search);
        if (params.get('variant') === 'desert') {
          var title = 'iVASA — Real Therapy, From Wherever You Are';
          var desc =
            'No therapist nearby? No waitlist. No commute. Clinical-depth AI therapy available 24/7 for $8/month. Take a 30-second assessment to get started.';
          document.title = title;
          var metas = document.querySelectorAll('meta');
          metas.forEach(function (m) {
            if (m.getAttribute('name') === 'description') m.setAttribute('content', desc);
            if (m.getAttribute('property') === 'og:title') m.setAttribute('content', title);
            if (m.getAttribute('property') === 'og:description') m.setAttribute('content', desc);
            if (m.getAttribute('name') === 'twitter:title') m.setAttribute('content', title);
            if (m.getAttribute('name') === 'twitter:description') m.setAttribute('content', desc);
          });
        }
      })();
    </script>
  </body>
</html>
